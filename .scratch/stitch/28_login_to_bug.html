</div>
<!-- Input Fields -->
<div class="flex flex-col gap-sm">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary auth-input transition-all duration-200" id="email" placeholder="name@company.com" required="" type="email">
</div>

</div>

                    Join an existing team instead

<!-- Footer Component -->

<script>
        function setMode(mode) {
            const soloBtn = document.getElementById('btn-solo');
            const teamBtn = document.getElementById('btn-team');
            const teamContext = document.getElementById('team-context');

            if (mode === 'solo') {
                soloBtn.classList.add('bg-primary-container', 'text-on-primary-container');
                soloBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                teamBtn.classList.remove('bg-primary-container', 'text-on-primary-container');
                teamBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                teamContext.classList.add('hidden');
            } else {
                teamBtn.classList.add('bg-primary-container', 'text-on-primary-container');
                teamBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                soloBtn.classList.remove('bg-primary-container', 'text-on-primary-container');
                soloBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                teamContext.classList.remove('hidden');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Micro-interaction: Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Authenticating...';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('In a real application, this would authenticate against the Bug AI Cognitive OS backend.');
            }, 1500);
        });
    </script>
