<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(27, 32, 36, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(136, 146, 155, 0.1);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }
        .toggle-active {
            background-color: #30353a;
            color: #89ceff;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center p-gutter relative overflow-hidden">
<!-- Atmospheric Background Glow -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/10 blur-[120px] rounded-full pointer-events-none"></div>
<main class="w-full max-w-[440px] z-10">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-xl">
<img alt="Bug BOS Logo" class="w-16 h-16 rounded-xl mb-md" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWpa3Oua4oLmC9O18RmhHskzURLdeLFmWhPXiaV0V-fjG2k_nw6NiBqISb-KiPMNT7vGKYcWCTMqCrzNv_SIFdz-BDklZ_tK7-Gqi-XVFh_pzQ2yJ-Ud3w16Nl4xLNMm-TAa4FlZBW_t3tiMQrwCBo-WnVD2MYNtBa87EJTkdPZ5AKwH1JhSHjobT2uX4REETL3oYLTbolU4B_oN4Fm38coR4WxUyX7geBMdBGbRC1FfOiGxqHWdXHffRPY3O4U2gN6DNliVZy3Fc">
<h1 class="font-headline-lg text-headline-lg mb-xs">Create Account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Join the next generation of cognitive operations.</p>
</header>
<div class="glass-panel rounded-xl p-lg shadow-2xl">
<!-- Account Type Toggle -->
<div class="flex p-xs bg-surface-container-low rounded-lg mb-lg border border-outline-variant">
<button class="flex-1 py-sm font-label-md text-label-md rounded-md transition-all toggle-active" id="soloBtn" onclick="toggleFlow('solo')">
                    Solo
                </button>
<button class="flex-1 py-sm font-label-md text-label-md rounded-md transition-all text-on-surface-variant hover:text-on-surface" id="teamBtn" onclick="toggleFlow('team')">
                    Team
                </button>
</div>
<!-- Sign Up Form -->
<form class="space-y-md" id="signupForm">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-xs">Full Name</label>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg px-md py-sm text-on-surface font-body-md placeholder:text-outline transition-colors focus:border-primary-container" placeholder="John Doe" type="text">
</div>
<!-- Team Specific Field (Hidden by default) -->
<div class="space-y-xs hidden" id="orgField">
<label class="font-label-md text-label-md text-on-surface-variant px-xs">Organization Name</label>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg px-md py-sm text-on-surface font-body-md placeholder:text-outline transition-colors focus:border-primary-container" placeholder="Acme Corp" type="text">
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-xs">Email Address</label>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg px-md py-sm text-on-surface font-body-md placeholder:text-outline transition-colors focus:border-primary-container" placeholder="name@company.com" type="email">
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-xs">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg px-md py-sm text-on-surface font-body-md placeholder:text-outline transition-colors focus:border-primary-container" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-md py-md rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary-container/20" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-[#1b2024] px-md text-on-surface-variant uppercase tracking-widest">or continue with</span>
</div>
</div>
<!-- Social OAuth -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-highest border border-outline-variant rounded-lg py-sm hover:bg-surface-variant transition-colors group"><svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg><span class="font-label-md text-label-md text-on-surface">Google</span></button>
<button class="flex items-center justify-center gap-sm bg-surface-container-highest border border-outline-variant rounded-lg py-sm hover:bg-surface-variant transition-colors group"><svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg><span class="font-label-md text-label-md text-on-surface">Facebook</span></button>
</div>
</div>
<!-- Bottom Link -->
<footer class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary hover:underline font-medium ml-xs transition-colors" href="#">Sign In</a>
</p>
</footer>
</main>
<!-- UI Interactions -->
<script>
        function toggleFlow(type) {
            const soloBtn = document.getElementById('soloBtn');
            const teamBtn = document.getElementById('teamBtn');
            const orgField = document.getElementById('orgField');

            if (type === 'team') {
                teamBtn.classList.add('toggle-active', 'text-primary');
                teamBtn.classList.remove('text-on-surface-variant');
                soloBtn.classList.remove('toggle-active', 'text-primary');
                soloBtn.classList.add('text-on-surface-variant');
                orgField.classList.remove('hidden');
            } else {
                soloBtn.classList.add('toggle-active', 'text-primary');
                soloBtn.classList.remove('text-on-surface-variant');
                teamBtn.classList.remove('toggle-active', 'text-primary');
                teamBtn.classList.add('text-on-surface-variant');
                orgField.classList.add('hidden');
            }
        }

        // Form submission micro-interaction
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            setTimeout(() => {
                btn.innerHTML = 'Account Created';
                btn.classList.replace('bg-primary-container', 'bg-emerald-500');
            }, 1500);
        });
    </script>


</body></html>
